<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đặt lại mật khẩu OptiLens Shop</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f6f8fb;
        font-family: Arial, Helvetica, sans-serif;
      }
      .container {
        max-width: 560px;
        margin: 24px auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
      }
      .title {
        margin: 0 0 12px;
        font-size: 22px;
        color: #111827;
      }
      .desc {
        margin: 0 0 16px;
        font-size: 14px;
        line-height: 1.6;
        color: #374151;
      }
      .btn {
        display: inline-block;
        background: #dc2626;
        color: #fff !important;
        text-decoration: none;
        padding: 10px 16px;
        border-radius: 8px;
        font-weight: 600;
      }
      .muted {
        margin-top: 16px;
        font-size: 12px;
        color: #6b7280;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="title">Đặt lại mật khẩu</h2>
      <p class="desc">
        Bạn vừa yêu cầu đặt lại mật khẩu cho tài khoản OptiLens Shop.
      </p>
      <a
        class="btn"
        href="{{RESET_LINK}}"
        target="_blank"
        rel="noopener noreferrer"
        >Đặt lại mật khẩu</a
      >
      <p class="muted">
        Nếu nút không hoạt động, dùng liên kết sau:<br />
        {{RESET_LINK}}
      </p>
    </div>
  </body>
</html>
